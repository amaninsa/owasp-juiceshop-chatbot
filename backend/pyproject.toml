[tool.ruff]
line-length = 100
target-version = "py311"
src = ["."]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["B008", "UP045", "UP035"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(
  \.venv
  | venv
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["app", "rag", "api"]
skip_glob = [".venv/*", "venv/*"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = false
check_untyped_defs = true
exclude = ["(?x)(^tests/)"]
follow_imports = "silent"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"
