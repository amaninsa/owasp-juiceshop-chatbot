name: AI Platform CI/CD

on:
  push:
    branches: [develop, main]
    tags: ["v*"]
    paths:
      - "backend/**"
      - "chromadb/**"
      - "deploy/**"
      - "apps/**"
      - "helm/**"
      - "k8s/**"
      - "argocd/**"
      - "scripts/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "kind-config.yaml"
      - "kind-config.ci.yaml"
      - "Makefile"
      - "frontend/src/app/ai-widget/**"
      - "frontend/src/app/Services/ai-assistant.service.ts"
      - "frontend/src/environments/**"
      - ".github/workflows/ai-platform-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "chromadb/**"
      - "deploy/**"
      - "apps/**"
      - "helm/**"
      - "k8s/**"
      - "argocd/**"
      - "scripts/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "frontend/src/app/ai-widget/**"
      - "frontend/src/app/Services/ai-assistant.service.ts"
      - ".github/workflows/ai-platform-ci.yml"
  workflow_dispatch:
    inputs:
      deploy_kind:
        description: "Deploy to ephemeral KIND after build"
        type: boolean
        default: true
      deploy_argocd:
        description: "Commit updated image tags for ArgoCD"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  security-events: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ai: ${{ steps.filter.outputs.ai }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ai:
              - 'backend/**'
              - 'apps/**'
              - 'helm/**'
              - 'argocd/**'
            frontend:
              - 'frontend/src/app/ai-widget/**'
              - 'frontend/src/app/Services/ai-assistant.service.ts'
              - 'frontend/src/environments/**'
            docker:
              - 'backend/Dockerfile'
              - 'chromadb/**'
              - 'deploy/**'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/ai-platform-ci.yml'

  resolve-meta:
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      version_tag: ${{ steps.meta.outputs.version_tag }}
      owner: ${{ steps.meta.outputs.owner }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tags
        id: meta
        run: |
          SHA_TAG="${GITHUB_SHA::12}"
          VERSION_TAG=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_TAG="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            VERSION_TAG="$(python3 -c "import json; print(json.load(open('package.json'))['version'])")"
          fi
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA_TAG} version=${VERSION_TAG:-n/a} owner=${GITHUB_REPOSITORY_OWNER,,}"

  lint-python:
    needs: changes
    if: needs.changes.outputs.ai == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install lint tooling
        run: pip install -r requirements-dev.txt
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test-backend:
    needs: changes
    if: needs.changes.outputs.ai == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Pytest
        env:
          OPEN_AI_KEY: test-key
          PRODUCTS_CONFIG_PATH: ${{ github.workspace }}/config/default.yml
        run: pytest --cov=. --cov-report=term-missing

  lint-frontend-widget:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Install deps (ignore scripts for speed)
        run: |
          npm install --ignore-scripts
          cd frontend && npm install --ignore-scripts
      - name: Lint AI widget TypeScript
        run: |
          cd frontend
          npx eslint "src/app/ai-widget/**/*.ts" "src/app/Services/ai-assistant.service.ts" --max-warnings=0

  helm-lint:
    needs: changes
    if: needs.changes.outputs.ai == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0
      - name: Helm lint
        run: |
          helm lint ./helm --set backend.openai.apiKey=ci-test-key
          helm lint ./helm -f ./helm/values-local.yaml
          helm template juiceshop-chatbot ./helm -n juiceshop-chatbot -f ./helm/values-local.yaml >/dev/null
      - name: Kustomize build overlays
        run: |
          kubectl kustomize apps/overlays/local >/dev/null
          kubectl kustomize apps/overlays/dev >/dev/null
          kubectl kustomize apps/overlays/prod >/dev/null
          kubectl kustomize apps/overlays/ci >/dev/null

  build-scan-push:
    needs: [changes, resolve-meta, lint-python, test-backend, lint-frontend-widget, helm-lint]
    if: |
      always() &&
      (needs.lint-python.result == 'success' || needs.lint-python.result == 'skipped') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.lint-frontend-widget.result == 'success' || needs.lint-frontend-widget.result == 'skipped') &&
      (needs.helm-lint.result == 'success' || needs.helm-lint.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: .
            file: backend/Dockerfile
            image: owasp-juiceshop-chatbot-backend
          - name: chromadb
            context: .
            file: chromadb/Dockerfile
            image: owasp-juiceshop-chatbot-chromadb
          - name: juice-shop
            context: .
            file: Dockerfile
            image: owasp-juiceshop-chatbot-frontend
          - name: gateway
            context: .
            file: deploy/Dockerfile.gateway
            image: owasp-juiceshop-chatbot-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.resolve-meta.outputs.owner }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ needs.resolve-meta.outputs.owner }}/${{ matrix.image }}:${{ needs.resolve-meta.outputs.sha_tag }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: false

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ needs.resolve-meta.outputs.owner }}/${{ matrix.image }}:${{ needs.resolve-meta.outputs.sha_tag }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Push tags
        run: |
          OWNER="${{ needs.resolve-meta.outputs.owner }}"
          IMAGE="${{ env.REGISTRY }}/${OWNER}/${{ matrix.image }}"
          SHA="${{ needs.resolve-meta.outputs.sha_tag }}"
          VERSION="${{ needs.resolve-meta.outputs.version_tag }}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHA}"
          if [[ -n "${VERSION}" ]]; then
            docker tag "${IMAGE}:${SHA}" "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:${VERSION}"
          fi

  deploy-kind:
    needs: [resolve-meta, build-scan-push]
    if: |
      always() &&
      needs.build-scan-push.result == 'success' &&
      (
        github.ref == 'refs/heads/develop' ||
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_kind == true)
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create KIND cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: juiceshop-chatbot
          config: kind-config.ci.yaml
          wait: 120s

      - name: Install ingress-nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/kind/deploy.yaml
          kubectl -n ingress-nginx wait --for=condition=available deployment/ingress-nginx-controller --timeout=180s

      - name: Pull CI images and retag for local overlay
        env:
          OWNER: ${{ needs.resolve-meta.outputs.owner }}
          SHA: ${{ needs.resolve-meta.outputs.sha_tag }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for img in owasp-juiceshop-chatbot-backend owasp-juiceshop-chatbot-chromadb owasp-juiceshop-chatbot-frontend; do
            docker pull "ghcr.io/${OWNER}/${img}:${SHA}"
            docker tag "ghcr.io/${OWNER}/${img}:${SHA}" "${img}:local"
            kind load docker-image "${img}:local" --name juiceshop-chatbot
          done

      - name: Create OpenAI secret
        env:
          OPEN_AI_KEY: ${{ secrets.OPEN_AI_KEY }}
        run: |
          kubectl create namespace juiceshop-chatbot --dry-run=client -o yaml | kubectl apply -f -
          if [[ -z "${OPEN_AI_KEY}" ]]; then
            echo "OPEN_AI_KEY secret not set — deploying with placeholder (chat will fail)"
            OPEN_AI_KEY="missing"
          fi
          kubectl -n juiceshop-chatbot create secret generic juiceshop-chatbot-secrets \
            --from-literal=OPEN_AI_KEY="${OPEN_AI_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy CI overlay
        run: |
          kubectl apply -k apps/overlays/ci
          kubectl -n juiceshop-chatbot rollout status deployment/juiceshop-chatbot-chromadb --timeout=180s
          kubectl -n juiceshop-chatbot rollout status deployment/juiceshop-chatbot-backend --timeout=300s
          kubectl -n juiceshop-chatbot rollout status deployment/juiceshop-chatbot-frontend --timeout=180s

      - name: Smoke test via port-forward
        run: |
          kubectl -n juiceshop-chatbot port-forward svc/juiceshop-chatbot-backend 8000:8000 &
          PF_PID=$!
          sleep 5
          curl -fsS http://127.0.0.1:8000/livez
          curl -fsS http://127.0.0.1:8000/health || true
          kill "${PF_PID}" || true

  update-gitops-tags:
    needs: [resolve-meta, build-scan-push]
    if: |
      always() &&
      needs.build-scan-push.result == 'success' &&
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/develop' ||
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kustomize/Helm image tags
        env:
          OWNER: ${{ needs.resolve-meta.outputs.owner }}
          SHA: ${{ needs.resolve-meta.outputs.sha_tag }}
          VERSION: ${{ needs.resolve-meta.outputs.version_tag }}
        run: |
          chmod +x scripts/update-image-tags.sh
          OWNER="${OWNER}" REGISTRY=ghcr.io \
            ./scripts/update-image-tags.sh "${SHA}" "${VERSION}"

      - name: Commit GitOps tag updates (ArgoCD path)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): bump image tags to ${{ needs.resolve-meta.outputs.sha_tag }}"
          file_pattern: apps/overlays/**/*.yaml helm/values-dev.yaml helm/values.yaml
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
