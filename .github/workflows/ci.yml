# =============================================================================
# CI — Quality gates + GHCR publish (SHA tags)
# =============================================================================
# Triggers: pull_request, push to main/develop, workflow_dispatch
#
# Gates:
#   - Gitleaks
#   - Backend: Black, isort, Ruff, mypy, pytest
#   - Frontend: npm ci/install + npm run build
#   - Docker build frontend/backend(/chromadb) + Trivy + push GHCR
#
# Deploy is NEVER done here — see cd.yml → Argo CD.
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  push:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"
  NODE_OPTIONS: "--max_old_space_size=4096"

jobs:
  # Skip CI image/build work when CD already owns the main GitOps bump commit
  gitleaks:
    name: Gitleaks
    if: ${{ github.event_name != 'push' || (github.event.head_commit != null && !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend (format · lint · types · test)
    if: ${{ github.event_name != 'push' || (github.event.head_commit != null && !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python backend
        uses: ./.github/actions/setup-python-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Black (check)
        run: black --check .
      - name: isort (check)
        run: isort --check-only .
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format (check)
        run: ruff format --check .
      - name: mypy
        run: mypy .
      - name: pytest
        env:
          OPEN_AI_KEY: test-key-not-real
          PRODUCTS_CONFIG_PATH: ${{ github.workspace }}/config/default.yml
        run: pytest --cov=. --cov-report=term-missing

  frontend:
    name: Frontend (npm ci · build)
    if: ${{ github.event_name != 'push' || (github.event.head_commit != null && !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node frontend
        uses: ./.github/actions/setup-node-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm run build
        run: npm run build

  # On push to main, CD owns GHCR + GitOps. On PR / develop / dispatch, CI publishes SHA images.
  images:
    name: Containers → GHCR
    needs: [gitleaks, backend, frontend]
    if: |
      always() &&
      needs.gitleaks.result == 'success' &&
      needs.backend.result == 'success' &&
      needs.frontend.result == 'success' &&
      (github.event_name != 'push' || github.ref != 'refs/heads/main')
    uses: ./.github/workflows/reusable-build-images.yml
    with:
      git-sha: ${{ github.event.pull_request.head.sha || github.sha }}
      push: true
    secrets: inherit

  ci-success:
    name: CI gate
    if: always()
    needs: [gitleaks, backend, frontend, images]
    runs-on: ubuntu-latest
    steps:
      - name: Require green jobs
        run: |
          set -euo pipefail
          echo "gitleaks=${{ needs.gitleaks.result }}"
          echo "backend=${{ needs.backend.result }}"
          echo "frontend=${{ needs.frontend.result }}"
          echo "images=${{ needs.images.result }}"

          # Entire workflow skipped for [skip ci] bumps
          if [[ "${{ needs.gitleaks.result }}" == "skipped" && "${{ needs.backend.result }}" == "skipped" ]]; then
            echo "CI skipped (GitOps bump commit)"
            exit 0
          fi

          [[ "${{ needs.gitleaks.result }}" == "success" ]] || exit 1
          [[ "${{ needs.backend.result }}" == "success" ]] || exit 1
          [[ "${{ needs.frontend.result }}" == "success" ]] || exit 1

          # images skipped on main push (CD handles publish) — OK
          IMG="${{ needs.images.result }}"
          if [[ "${IMG}" != "success" && "${IMG}" != "skipped" ]]; then
            exit 1
          fi
          echo "CI passed"
