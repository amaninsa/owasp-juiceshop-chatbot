# KIND cluster config for GitHub Actions (no hostPath bind mounts).
# Local demos should keep using kind-config.yaml.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: juiceshop-chatbot
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
