apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production-inspired profile: PVC-backed storage + longer retention.
# Apply with: kubectl apply -k k8s/monitoring/production
# Or set MONITORING_PROFILE=production make monitoring

resources:
  - ../base
  - pvc.yaml

labels:
  - pairs:
      juiceshop-chatbot.io/profile: production
    includeSelectors: false

patches:
  - path: patches/prometheus-pvc.yaml
  - path: patches/loki-pvc.yaml
  - path: patches/grafana-pvc.yaml
  - path: patches/prometheus-retention.yaml
  - path: patches/loki-retention.yaml
  - path: patches/resources.yaml
