apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: juiceshop-chatbot-observability
    name: monitoring
    # Required for NetworkPolicy namespaceSelector on KIND / recent K8s
    kubernetes.io/metadata.name: monitoring
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: juiceshop-chatbot-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: juiceshop-chatbot-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: juiceshop-chatbot-observability
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "nodes/proxy", "services", "endpoints", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: juiceshop-chatbot-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: juiceshop-chatbot-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: juiceshop-chatbot-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
