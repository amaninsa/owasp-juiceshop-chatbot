# cAdvisor DaemonSet tuned for KIND (containerd).
# automountServiceAccountToken must be false: hostPath /var/run would otherwise
# conflict with the projected SA mount under /var/run/secrets.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: monitoring
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/part-of: juiceshop-chatbot-observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cadvisor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadvisor
        app.kubernetes.io/part-of: juiceshop-chatbot-observability
    spec:
      automountServiceAccountToken: false
      tolerations:
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.49.1
          imagePullPolicy: IfNotPresent
          args:
            - --housekeeping_interval=30s
            - --max_housekeeping_interval=35s
            - --event_storage_event_limit=default=0
            - --event_storage_age_limit=default=0
            - --disable_metrics=advtcp,cpu_topology,disk,diskIO,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp
            - --docker_only=false
            - --store_container_labels=false
            - --containerd=/run/containerd/containerd.sock
          ports:
            - name: metrics
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            privileged: true
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: containerd
              mountPath: /run/containerd
              readOnly: true
            - name: disk
              mountPath: /dev/disk
              readOnly: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: sys
          hostPath:
            path: /sys
        - name: containerd
          hostPath:
            path: /run/containerd
        - name: disk
          hostPath:
            path: /dev/disk
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: monitoring
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/part-of: juiceshop-chatbot-observability
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: cadvisor
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
