apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: juiceshop-chatbot-observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default-local
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity="critical"
          receiver: default-local
          continue: true

    receivers:
      # Local KIND: alerts are visible in the Alertmanager UI.
      # Add webhook_configs / slack_configs here for external routing.
      - name: default-local

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ["alertname", "namespace"]
