# Allow Prometheus (monitoring ns) to scrape backend /metrics in the app namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: juiceshop-chatbot-allow-prometheus-scrape
  namespace: juiceshop-chatbot
  labels:
    app.kubernetes.io/part-of: juiceshop-chatbot
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8000
