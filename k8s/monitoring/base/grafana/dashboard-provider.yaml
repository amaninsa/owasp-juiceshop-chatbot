apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: juiceshop-chatbot-observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: juiceshop-chatbot
        orgId: 1
        folder: Juice Shop Chatbot
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
