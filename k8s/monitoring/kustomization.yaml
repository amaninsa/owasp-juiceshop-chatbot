apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Default entrypoint for make monitoring / Argo CD:
# local KIND profile (emptyDir, 24h retention, low resources).
#
# Profiles:
#   k8s/monitoring          → local (default)
#   k8s/monitoring/local    → same as default
#   k8s/monitoring/production → PVC + longer retention

resources:
  - local
