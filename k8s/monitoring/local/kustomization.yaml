apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local KIND / portfolio profile: emptyDir, 24h retention, low RAM/disk.
# Applied by default via: kubectl apply -k k8s/monitoring
# or: make monitoring
#
# cAdvisor DaemonSet is deleted here — too heavy for Apple Silicon KIND demos.
# Production profile keeps cAdvisor from base.

resources:
  - ../base

labels:
  - pairs:
      juiceshop-chatbot.io/profile: local
    includeSelectors: false

patches:
  - path: patches/alertmanager-resources.yaml
  - path: patches/kube-state-metrics-resources.yaml
  - path: patches/node-exporter-resources.yaml
  - path: patches/delete-cadvisor-ds.yaml
  - path: patches/delete-cadvisor-svc.yaml
