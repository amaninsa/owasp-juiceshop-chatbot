apiVersion: apps/v1
kind: Deployment
metadata:
  name: juiceshop-chatbot-chromadb
  namespace: juiceshop-chatbot
  labels:
    app.kubernetes.io/name: juiceshop-chatbot-chromadb
    app.kubernetes.io/instance: juiceshop-chatbot
    app.kubernetes.io/part-of: juiceshop-chatbot
    app.kubernetes.io/component: vector-db
    app.kubernetes.io/version: "0.5.23"
  annotations:
    description: "ChromaDB vector store for Juice Shop RAG"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: juiceshop-chatbot-chromadb
      app.kubernetes.io/instance: juiceshop-chatbot
      app.kubernetes.io/component: vector-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juiceshop-chatbot-chromadb
        app.kubernetes.io/instance: juiceshop-chatbot
        app.kubernetes.io/part-of: juiceshop-chatbot
        app.kubernetes.io/component: vector-db
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: default
      # Soft preference: keep vector DB off crowded app nodes when possible
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chromadb
          image: owasp-juiceshop-chatbot-chromadb:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: juiceshop-chatbot-config
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            # Upstream Chroma image historically expects writable FS + its own user.
            readOnlyRootFilesystem: false
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: juiceshop-chatbot-chromadb-pvc
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
