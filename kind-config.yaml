# KIND cluster for Juice Shop AI Assistant (local production-like environment)
# Docs: https://kind.sigs.k8s.io/docs/user/configuration/
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: juiceshop-chatbot
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
nodes:
  # Single-node keeps hostPath Chroma PV simple and reliable for local demos.
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
    extraMounts:
      - hostPath: ./data/kind/chromadb
        containerPath: /mnt/data/juiceshop-chatbot-chromadb
        readOnly: false
