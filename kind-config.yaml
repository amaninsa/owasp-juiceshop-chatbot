# KIND cluster for Juice Shop AI Assistant (local production-like environment)
# Tuned for Apple Silicon (Docker Desktop / Colima / OrbStack) — not HA.
# Docs: https://kind.sigs.k8s.io/docs/user/configuration/
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: juiceshop-chatbot
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  # Disable default CNI swap-heavy features; kindnet is fine for single-node demos.
nodes:
  # Single-node keeps hostPath Chroma PV simple and reliable for local demos.
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
            # Evict earlier so pods restart instead of filling the KIND disk.
            eviction-hard: "imagefs.available<10%,nodefs.available<10%,memory.available<100Mi"
            eviction-soft: "imagefs.available<15%,nodefs.available<15%"
            eviction-soft-grace-period: "imagefs.available=1m30s,nodefs.available=1m30s"
            # Reclaim unused images sooner (helps Apple Silicon Docker disk pressure).
            image-gc-high-threshold: "70"
            image-gc-low-threshold: "50"
            # Prefer containerd image GC behaviour suitable for demos.
            serialize-image-pulls: "false"
      - |
        kind: KubeletConfiguration
        # Keep ephemeral storage accounting accurate inside the KIND node.
        evictionMaxPodGracePeriod: 30
        maxPods: 110
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
    extraMounts:
      - hostPath: ./data/kind/chromadb
        containerPath: /mnt/data/juiceshop-chatbot-chromadb
        readOnly: false
