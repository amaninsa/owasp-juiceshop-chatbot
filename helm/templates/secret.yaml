{{- if and .Values.backend.enabled (not .Values.backend.openai.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "juiceshop-chatbot.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  OPEN_AI_KEY: {{ required "Set backend.openai.apiKey or backend.openai.existingSecret" .Values.backend.openai.apiKey | quote }}
{{- end }}
