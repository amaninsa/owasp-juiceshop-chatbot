{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "juiceshop-chatbot.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "juiceshop-chatbot.frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "juiceshop-chatbot.chromadb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "juiceshop-chatbot.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ include "juiceshop-chatbot.configmapName" . | quote }}]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ include "juiceshop-chatbot.secretName" . | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "juiceshop-chatbot.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "juiceshop-chatbot.backend.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "juiceshop-chatbot.backend.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
