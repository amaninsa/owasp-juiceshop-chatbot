{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "juiceshop-chatbot.frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "juiceshop-chatbot.selectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
{{- end }}
---
{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "juiceshop-chatbot.backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "juiceshop-chatbot.selectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
{{- end }}
---
{{- if .Values.chromadb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "juiceshop-chatbot.chromadb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: vector-db
spec:
  type: {{ .Values.chromadb.service.type }}
  selector:
    {{- include "juiceshop-chatbot.selectorLabels" (dict "root" . "component" "vector-db") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.chromadb.service.port }}
      targetPort: http
{{- end }}
