apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "juiceshop-chatbot.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "juiceshop-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  API_HOST: "0.0.0.0"
  API_PORT: {{ .Values.backend.service.port | quote }}
  CHROMA_HOST: {{ include "juiceshop-chatbot.chromadb.fullname" . | quote }}
  CHROMA_PORT: {{ .Values.chromadb.service.port | quote }}
  CHROMA_COLLECTION: {{ .Values.backend.rag.collection | quote }}
  PRODUCTS_CONFIG_PATH: {{ .Values.backend.rag.productsConfigPath | quote }}
  OPENAI_MODEL: {{ .Values.backend.openai.model | quote }}
  OPENAI_EMBEDDING_MODEL: {{ .Values.backend.openai.embeddingModel | quote }}
  RAG_TOP_K: {{ .Values.backend.rag.topK | quote }}
  INGEST_ON_STARTUP: {{ .Values.backend.rag.ingestOnStartup | quote }}
  INGEST_RESET: {{ .Values.backend.rag.ingestReset | quote }}
  CHROMA_WAIT_TIMEOUT_SECONDS: {{ .Values.backend.rag.chromaWaitTimeoutSeconds | quote }}
  ASSISTANT_NAME: {{ .Values.backend.rag.assistantName | quote }}
  LOG_LEVEL: {{ .Values.backend.observability.logLevel | quote }}
  LOG_JSON: {{ .Values.backend.observability.logJson | quote }}
  NODE_ENV: {{ .Values.frontend.env.NODE_ENV | quote }}
  PORT: {{ .Values.frontend.env.PORT | quote }}
  IS_PERSISTENT: {{ .Values.chromadb.env.IS_PERSISTENT | quote }}
  ANONYMIZED_TELEMETRY: {{ .Values.chromadb.env.ANONYMIZED_TELEMETRY | quote }}
