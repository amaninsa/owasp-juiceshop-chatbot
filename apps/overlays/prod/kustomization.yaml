# Production overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: juiceshop-chatbot-prod

resources:
  - ../../base

images:
  - name: owasp-juiceshop-chatbot-chromadb
    newName: ghcr.io/amaninsa/owasp-juiceshop-chatbot-chromadb
    newTag: "1.1.0"
  - name: owasp-juiceshop-chatbot-backend
    newName: ghcr.io/amaninsa/owasp-juiceshop-chatbot-backend
    newTag: "1.1.0"
  - name: owasp-juiceshop-chatbot-frontend
    newName: ghcr.io/amaninsa/owasp-juiceshop-chatbot-frontend
    newTag: "20.1.1"

replicas:
  - name: juiceshop-chatbot-frontend
    count: 3
  - name: juiceshop-chatbot-backend
    count: 3
  - name: juiceshop-chatbot-chromadb
    count: 1

patches:
  - path: patches/ingress-host.yaml
  - path: patches/configmap-prod.yaml
  - path: patches/resources-prod.yaml
  - target:
      kind: PersistentVolumeClaim
      name: juiceshop-chatbot-chromadb-pvc
    patch: |-
      - op: remove
        path: /spec/volumeName
      - op: replace
        path: /spec/storageClassName
        value: gp2
      - op: replace
        path: /spec/resources/requests/storage
        value: 20Gi
