apiVersion: apps/v1
kind: Deployment
metadata:
  name: juiceshop-chatbot-frontend
  namespace: juiceshop-chatbot
  labels:
    app.kubernetes.io/name: juiceshop-chatbot-frontend
    app.kubernetes.io/instance: juiceshop-chatbot
    app.kubernetes.io/part-of: juiceshop-chatbot
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "20.1.1"
  annotations:
    description: "OWASP Juice Shop UI with embedded AI chat widget"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: juiceshop-chatbot-frontend
      app.kubernetes.io/instance: juiceshop-chatbot
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juiceshop-chatbot-frontend
        app.kubernetes.io/instance: juiceshop-chatbot
        app.kubernetes.io/part-of: juiceshop-chatbot
        app.kubernetes.io/component: frontend
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: juiceshop-chatbot-frontend
      automountServiceAccountToken: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: juiceshop-chatbot-frontend
                    app.kubernetes.io/component: frontend
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 10
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 0
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: owasp-juiceshop-chatbot-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: juiceshop-chatbot-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: juiceshop-chatbot-config
                  key: PORT
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
