# Dedicated ServiceAccounts — workloads do not use the namespace default SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: juiceshop-chatbot-backend
  namespace: juiceshop-chatbot
  labels:
    app.kubernetes.io/name: juiceshop-chatbot-backend
    app.kubernetes.io/part-of: juiceshop-chatbot
    app.kubernetes.io/component: rbac
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: juiceshop-chatbot-frontend
  namespace: juiceshop-chatbot
  labels:
    app.kubernetes.io/name: juiceshop-chatbot-frontend
    app.kubernetes.io/part-of: juiceshop-chatbot
    app.kubernetes.io/component: rbac
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: juiceshop-chatbot-chromadb
  namespace: juiceshop-chatbot
  labels:
    app.kubernetes.io/name: juiceshop-chatbot-chromadb
    app.kubernetes.io/part-of: juiceshop-chatbot
    app.kubernetes.io/component: rbac
automountServiceAccountToken: false
