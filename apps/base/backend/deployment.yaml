apiVersion: apps/v1
kind: Deployment
metadata:
  name: juiceshop-chatbot-backend
  namespace: juiceshop-chatbot
  labels:
    app.kubernetes.io/name: juiceshop-chatbot-backend
    app.kubernetes.io/instance: juiceshop-chatbot
    app.kubernetes.io/part-of: juiceshop-chatbot
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.1.0"
  annotations:
    description: "FastAPI RAG AI assistant"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: juiceshop-chatbot-backend
      app.kubernetes.io/instance: juiceshop-chatbot
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juiceshop-chatbot-backend
        app.kubernetes.io/instance: juiceshop-chatbot
        app.kubernetes.io/part-of: juiceshop-chatbot
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: juiceshop-chatbot-backend
      automountServiceAccountToken: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: juiceshop-chatbot-backend
                    app.kubernetes.io/component: backend
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 10
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-chromadb
          image: curlimages/curl:8.11.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "Waiting for ChromaDB..."
              until curl -fsS "http://juiceshop-chatbot-chromadb:8000/api/v1/heartbeat" >/dev/null; do
                sleep 2
              done
              echo "ChromaDB is ready."
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: backend
          image: owasp-juiceshop-chatbot-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: juiceshop-chatbot-config
            - secretRef:
                name: juiceshop-chatbot-secrets
          env:
            # Prefer Service DNS over ConfigMap defaults if overridden
            - name: CHROMA_HOST
              value: juiceshop-chatbot-chromadb
            - name: CHROMA_PORT
              value: "8000"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /livez
              port: http
            failureThreshold: 36
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
