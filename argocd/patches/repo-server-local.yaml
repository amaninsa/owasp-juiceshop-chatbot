# Applied after Argo CD install — resources + parallelism only (safe strategic merge).
# emptyDir sizeLimits are applied separately in scripts/argocd-install.sh via JSON patch.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      containers:
        - name: argocd-repo-server
          env:
            - name: ARGOCD_REPO_SERVER_PARALLELISM_LIMIT
              value: "2"
            - name: ARGOCD_GIT_ATTEMPTS_COUNT
              value: "2"
            - name: ARGOCD_EXEC_TIMEOUT
              value: "90s"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
