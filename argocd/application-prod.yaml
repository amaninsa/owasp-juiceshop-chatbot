apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: juiceshop-chatbot-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: juiceshop-chatbot
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-alerts
spec:
  project: juiceshop-chatbot
  source:
    repoURL: https://github.com/amaninsa/owasp-juiceshop-chatbot.git
    targetRevision: main
    path: apps/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: juiceshop-chatbot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 20
