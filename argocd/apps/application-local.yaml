# ArgoCD Application — local KIND overlay
# Prerequisite: create secret juiceshop-chatbot-secrets in namespace juiceshop-chatbot
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: juiceshop-chatbot-local
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: juiceshop-chatbot
    app.kubernetes.io/component: workload
    environment: local
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: juiceshop-chatbot
  source:
    repoURL: https://github.com/amaninsa/owasp-juiceshop-chatbot.git
    targetRevision: HEAD
    path: apps/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: juiceshop-chatbot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  revisionHistoryLimit: 10
