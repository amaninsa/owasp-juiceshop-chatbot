apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: juiceshop-chatbot
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/amaninsa/owasp-juiceshop-chatbot.git
    targetRevision: main
    path: apps/overlays/local

  destination:
    server: https://kubernetes.default.svc
    namespace: juiceshop

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true

  revisionHistoryLimit: 5
