apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: juiceshop-chatbot-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: juiceshop-chatbot
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: juiceshop-chatbot
  source:
    repoURL: https://github.com/amaninsa/owasp-juiceshop-chatbot.git
    targetRevision: develop
    path: apps/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: juiceshop-chatbot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
