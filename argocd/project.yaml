apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: juiceshop-chatbot
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: juiceshop-chatbot
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: OWASP Juice Shop Chatbot — workloads + local observability
  sourceRepos:
    - https://github.com/amaninsa/owasp-juiceshop-chatbot.git
    # Allow forks during bootstrap; tighten in production.
    - "*"
  destinations:
    - namespace: juiceshop-chatbot
      server: https://kubernetes.default.svc
    - namespace: juiceshop-chatbot-dev
      server: https://kubernetes.default.svc
    - namespace: juiceshop-chatbot-prod
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    # EKS migration: add additional cluster destinations here, e.g.
    # - namespace: juiceshop-chatbot-prod
    #   server: https://XXXXXXXX.yl4.region.eks.amazonaws.com
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: ""
      kind: PersistentVolume
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: networking.k8s.io
      kind: IngressClass
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
  # Production safety: require signed commits / allow only main for prod via sync windows if needed
  syncWindows: []
